apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "symphony.fullname" . }}-workflow
  labels:
    {{- include "symphony.labels" . | nindent 4 }}
data:
  {{ .Values.workflow.fileName }}: |
    ---
    tracker:
      kind: {{ .Values.workflow.tracker.kind | quote }}
      project_owner_type: {{ .Values.workflow.tracker.projectOwnerType | quote }}
      project_owner: {{ .Values.workflow.tracker.projectOwner | quote }}
      project_number: {{ .Values.workflow.tracker.projectNumber }}
      project_repositories:
{{- range .Values.workflow.tracker.projectRepositories }}
        - {{ . | quote }}
{{- end }}
      api_key: {{ .Values.workflow.tracker.apiKey | quote }}
      active_states:
{{- range .Values.workflow.tracker.activeStates }}
        - {{ . | quote }}
{{- end }}
      terminal_states:
{{- range .Values.workflow.tracker.terminalStates }}
        - {{ . | quote }}
{{- end }}
    polling:
      interval_ms: {{ .Values.workflow.polling.intervalMs }}
    workspace:
      root: {{ .Values.workflow.workspace.root | quote }}
{{- if .Values.worker.enabled }}
    worker:
      ssh_hosts:
{{- range $i, $_ := until (int .Values.worker.replicas) }}
        - {{ include "symphony.workerHost" (dict "root" $ "ordinal" $i) | quote }}
{{- end }}
      max_concurrent_agents_per_host: {{ .Values.workflow.worker.maxConcurrentAgentsPerHost }}
    hooks:
      before_run: |
{{ .Values.workflow.hooks.beforeRun | indent 8 }}
      before_remove: |
{{ .Values.workflow.hooks.beforeRemove | indent 8 }}
      timeout_ms: {{ .Values.workflow.hooks.timeoutMs }}
{{- end }}
    server:
      port: {{ .Values.workflow.server.port }}
    observability:
      dashboard_enabled: {{ .Values.workflow.observability.dashboardEnabled }}
    agent:
      max_concurrent_agents: {{ .Values.workflow.agent.maxConcurrentAgents }}
      max_turns: {{ .Values.workflow.agent.maxTurns }}
    codex:
      command: {{ .Values.workflow.codex.command | quote }}
      approval_policy: {{ .Values.workflow.codex.approvalPolicy | quote }}
      thread_sandbox: {{ .Values.workflow.codex.threadSandbox | quote }}
      turn_sandbox_policy:
        type: {{ .Values.workflow.codex.turnSandboxPolicy.type | quote }}
    ---
{{ .Values.workflow.body | indent 4 }}
