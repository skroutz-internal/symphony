{{- $modelSecretName := include "symphony.modelSecretName" . | trim -}}
{{- $githubTokenSecretName := include "symphony.githubTokenSecretName" . | trim -}}
{{- $githubAppSecretName := include "symphony.githubAppSecretName" . | trim -}}
{{- $workerSshSecretName := include "symphony.workerSshSecretName" . | trim -}}
{{- $documents := list -}}
{{- if .Values.secrets.model.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $modelSecretName }}
  labels:
    {{- include "symphony.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.model.key }}: {{ required "secrets.model.value is required when secrets.model.create=true" .Values.secrets.model.value | quote }}
---
{{- end }}
{{- if .Values.secrets.githubToken.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $githubTokenSecretName }}
  labels:
    {{- include "symphony.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.githubToken.key }}: {{ required "secrets.githubToken.value is required when secrets.githubToken.create=true" .Values.secrets.githubToken.value | quote }}
---
{{- end }}
{{- if .Values.secrets.githubApp.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $githubAppSecretName }}
  labels:
    {{- include "symphony.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.githubApp.appIdKey }}: {{ required "secrets.githubApp.appId is required when secrets.githubApp.create=true" .Values.secrets.githubApp.appId | quote }}
  {{ .Values.secrets.githubApp.installationIdKey }}: {{ required "secrets.githubApp.installationId is required when secrets.githubApp.create=true" .Values.secrets.githubApp.installationId | quote }}
  {{ .Values.secrets.githubApp.privateKeyKey }}: |
{{ required "secrets.githubApp.privateKey is required when secrets.githubApp.create=true" .Values.secrets.githubApp.privateKey | indent 4 }}
---
{{- end }}
{{- if .Values.secrets.workerSsh.create -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $workerSshSecretName }}
  labels:
    {{- include "symphony.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.workerSsh.privateKeyKey }}: |
{{ required "secrets.workerSsh.privateKey is required when secrets.workerSsh.create=true" .Values.secrets.workerSsh.privateKey | indent 4 }}
  {{ .Values.secrets.workerSsh.publicKeyKey }}: {{ required "secrets.workerSsh.publicKey is required when secrets.workerSsh.create=true" .Values.secrets.workerSsh.publicKey | quote }}
{{- end }}
