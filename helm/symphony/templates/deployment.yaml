{{- $githubTokenSecretName := include "symphony.githubTokenSecretName" . | trim -}}
{{- $modelSecretName := include "symphony.modelSecretName" . | trim -}}
{{- $githubAppSecretName := include "symphony.githubAppSecretName" . | trim -}}
{{- $workerSshSecretName := include "symphony.workerSshSecretName" . | trim -}}
{{- if and .Values.worker.enabled (eq $workerSshSecretName "") }}{{ fail "worker.enabled=true requires secrets.workerSsh.secretName or secrets.workerSsh.create=true" }}{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "symphony.fullname" . }}
  labels:
    {{- include "symphony.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "symphony.serverSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "symphony.serverSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: symphony
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.server.command }}
          command:
            {{- toYaml .Values.server.command | nindent 12 }}
          {{- end }}
          args:
            - --i-understand-that-this-will-be-running-without-the-usual-guardrails
            - --port
            - {{ .Values.server.port | quote }}
            - /etc/symphony/workflow/{{ .Values.workflow.fileName }}
            {{- with .Values.server.extraArgs }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.server.port }}
              protocol: TCP
          env:
            {{- if $githubTokenSecretName }}
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ $githubTokenSecretName }}
                  key: {{ .Values.secrets.githubToken.key }}
            {{- end }}
            {{- if $modelSecretName }}
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $modelSecretName }}
                  key: {{ .Values.secrets.model.key }}
            {{- end }}
            {{- if $githubAppSecretName }}
            - name: GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $githubAppSecretName }}
                  key: {{ .Values.secrets.githubApp.appIdKey }}
            - name: GITHUB_INSTALLATION_ID
              valueFrom:
                secretKeyRef:
                  name: {{ $githubAppSecretName }}
                  key: {{ .Values.secrets.githubApp.installationIdKey }}
            - name: GITHUB_APP_PRIVATE_KEY_PATH
              value: /etc/symphony/github-app/app-private-key.pem
            {{- end }}
            {{- if .Values.worker.enabled }}
            - name: SYMPHONY_SSH_CONFIG
              value: /etc/symphony/ssh/config
            {{- end }}
          volumeMounts:
            - name: workflow
              mountPath: /etc/symphony/workflow
              readOnly: true
            {{- if $githubAppSecretName }}
            - name: github-app-private-key
              mountPath: /etc/symphony/github-app
              readOnly: true
            {{- end }}
            {{- if .Values.worker.enabled }}
            - name: worker-ssh-config
              mountPath: /etc/symphony/ssh/config
              subPath: config
              readOnly: true
            - name: worker-ssh-private-key
              mountPath: /etc/symphony/ssh/id_ed25519
              subPath: {{ .Values.secrets.workerSsh.privateKeyKey }}
              readOnly: true
            {{- end }}
            - name: workspaces
              mountPath: {{ .Values.persistence.mountPath }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      volumes:
        - name: workflow
          configMap:
            name: {{ include "symphony.fullname" . }}-workflow
        {{- if $githubAppSecretName }}
        - name: github-app-private-key
          secret:
            secretName: {{ $githubAppSecretName }}
            items:
              - key: {{ .Values.secrets.githubApp.privateKeyKey }}
                path: app-private-key.pem
        {{- end }}
        {{- if .Values.worker.enabled }}
        - name: worker-ssh-config
          configMap:
            name: {{ include "symphony.fullname" . }}-ssh-config
            items:
              - key: config
                path: config
        - name: worker-ssh-private-key
          secret:
            secretName: {{ $workerSshSecretName }}
            items:
              - key: {{ .Values.secrets.workerSsh.privateKeyKey }}
                path: {{ .Values.secrets.workerSsh.privateKeyKey }}
        {{- end }}
        - name: workspaces
          {{- if .Values.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ default (printf "%s-workspaces" (include "symphony.fullname" .)) .Values.persistence.existingClaim }}
          {{- else }}
          emptyDir: {}
          {{- end }}
